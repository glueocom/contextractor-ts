name: build-napi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            zig: false
          - platform: darwin-x64
            runner: macos-14
            target: x86_64-apple-darwin
            zig: false
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig: true
          - platform: linux-arm64-gnu
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zig: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Install zig
        if: matrix.zig == true
        uses: korandoru/setup-zig@v1
        with:
          zig-version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.zig == true
        run: cargo install cargo-zigbuild --locked

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build native (zig)
        if: matrix.zig == true
        run: pnpm -F @contextractor/engine-native exec napi build --platform --release --target ${{ matrix.target }} --zig

      - name: Build native (host)
        if: matrix.zig != true
        run: pnpm -F @contextractor/engine-native exec napi build --platform --release --target ${{ matrix.target }}

      - name: Stage prebuild
        run: |
          mkdir -p packages/contextractor-engine/native/npm/${{ matrix.platform }}
          mv packages/contextractor-engine/native/contextractor-engine-native.${{ matrix.platform }}.node \
             packages/contextractor-engine/native/npm/${{ matrix.platform }}/

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}
          path: packages/contextractor-engine/native/npm/${{ matrix.platform }}/contextractor-engine-native.${{ matrix.platform }}.node
          if-no-files-found: error
          retention-days: 7

  commit-prebuilds:
    name: commit-prebuilds
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: prebuilds
          pattern: prebuild-*
          merge-multiple: false

      - name: Stage refreshed prebuilds
        run: |
          set -euo pipefail
          for dir in prebuilds/prebuild-*; do
            platform="${dir##*prebuild-}"
            mkdir -p "packages/contextractor-engine/native/npm/${platform}"
            cp "${dir}/contextractor-engine-native.${platform}.node" \
               "packages/contextractor-engine/native/npm/${platform}/"
          done

      - name: Open refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "ci/refresh-napi-prebuilds-${{ github.ref_name }}"
          base: main
          title: "ci: refresh napi-rs prebuilds for ${{ github.ref_name }}"
          commit-message: "ci: refresh napi-rs prebuilds for ${{ github.ref_name }}"
          body: |
            Auto-generated by `.github/workflows/build-napi.yml` on tag
            `${{ github.ref_name }}`. Replaces the committed `.node` files
            under `packages/contextractor-engine/native/npm/<platform>/`.
          add-paths: packages/contextractor-engine/native/npm/**/*.node

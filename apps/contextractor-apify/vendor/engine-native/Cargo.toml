[package]
name = "contextractor-engine-native"
version = "0.3.12"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
publish = false
description = "napi-rs binding to rs-trafilatura"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi6", "serde-json"] }
napi-derive = "2"
rs-trafilatura = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "debuginfo"
